description: >-
  Gaming and Leisure Properties, Inc. (NASDAQ: GLPI) is "the nation's first
  real estate investment trust focused on acquiring real property assets
  leased to gaming operators." Headquartered in Wyomissing, Pennsylvania,
  GLPI's portfolio comprises 71 premier gaming and related facilities
  across 21 states, totaling more than 29.3 million square feet and over
  15,100 hotel rooms, leased on a triple-net basis to operators including
  Penn Entertainment, Caesars Entertainment, Bally's Corporation, Boyd
  Gaming, the Cordish Companies, and Hard Rock. No public developer API,
  data feed, or GitHub organization has been identified; GLPI engages
  investors, tenants, and partners through corporate and investor
  relations channels only.
